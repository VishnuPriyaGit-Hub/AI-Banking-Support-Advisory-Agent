services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: banking-support-agent:latest
    container_name: banking-support-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  ui:
    image: banking-support-agent:latest
    container_name: banking-support-ui
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: streamlit run app/ui/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    depends_on:
      api:
        condition: service_started
